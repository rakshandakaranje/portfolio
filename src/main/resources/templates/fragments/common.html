<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Shared Head Fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional portfolio of Rakshanda Karanje, B.Tech Computer Science Engineering Student - AI & Data Analytics Enthusiast.">
    <meta name="author" content="Rakshanda Karanje">
    <title th:text="${title} + ' | Rakshanda Karanje'"></title>
    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <!-- Shared Navbar Fragment -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg fixed-top custom-navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Rakshanda<span>.</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'about'} ? 'active'" th:href="@{/about}">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'projects'} ? 'active'" th:href="@{/projects}">Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'certifications'} ? 'active'" th:href="@{/certifications}">Certifications</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'contact'} ? 'active'" th:href="@{/contact}">Contact</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                        <a class="btn btn-sage px-4" th:href="@{/contact}">Hire Me</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Shared Footer Fragment -->
    <footer th:fragment="footer" class="custom-footer">
        <div class="container text-center">
            <div class="footer-socials">
                <a href="https://www.linkedin.com/in/rakshanda-karanje-497276229/" target="_blank" rel="noopener noreferrer" class="social-icon-btn" title="LinkedIn">
                    <i class="bi bi-linkedin"></i>
                </a>
                <a href="https://github.com/rakshandakaranje" target="_blank" rel="noopener noreferrer" class="social-icon-btn" title="GitHub">
                    <i class="bi bi-github"></i>
                </a>
                <a href="mailto:rakshandakaranje05@gmail.com" class="social-icon-btn" title="Email">
                    <i class="bi bi-envelope"></i>
                </a>
            </div>
            <div class="row mt-4">
                <div class="col-12">
                    <ul class="list-inline mb-2">
                        <li class="list-inline-item mx-2"><a th:href="@{/}" class="text-muted">Home</a></li>
                        <li class="list-inline-item mx-2"><a th:href="@{/about}" class="text-muted">About</a></li>
                        <li class="list-inline-item mx-2"><a th:href="@{/projects}" class="text-muted">Projects</a></li>
                        <li class="list-inline-item mx-2"><a th:href="@{/certifications}" class="text-muted">Certifications</a></li>
                        <li class="list-inline-item mx-2"><a th:href="@{/contact}" class="text-muted">Contact</a></li>
                    </ul>
                    <ul class="list-inline mb-3">
                        <li class="list-inline-item mx-2"><a href="https://www.linkedin.com/in/rakshanda-karanje-497276229/" target="_blank" rel="noopener noreferrer" class="text-muted fw-semibold text-success">LinkedIn</a></li>
                        <li class="list-inline-item mx-2"><a href="https://github.com/rakshandakaranje" target="_blank" rel="noopener noreferrer" class="text-muted fw-semibold text-success">GitHub</a></li>
                        <li class="list-inline-item mx-2"><a href="https://veilaana.vercel.app/" target="_blank" rel="noopener noreferrer" class="text-muted fw-semibold text-success">Veilaana Website</a></li>
                    </ul>
                    <p class="mb-0 text-muted">&copy; 2026 Rakshanda Karanje. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Shared Scripts Fragment -->
    <div th:fragment="scripts">
        <!-- Back to Top Button -->
        <button id="back-to-top" title="Go to top">
            <i class="bi bi-arrow-up"></i>
        </button>

        <!-- Bootstrap 5 Bundle JS CDN -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        
        <!-- Custom Script -->
        <script th:src="@{/js/script.js}"></script>
    </div>

</body>
</html>
